<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e2d6b; }
  #loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #fff; font-family: system-ui, sans-serif; gap: 10px;
  }
  #loading span { font-size: 12px; opacity: 0.7; }
  .spinner {
    width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  iframe { width: 100%; height: 100%; border: none; display: none; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span>Загрузка интерфейса...</span>
</div>
<iframe id="frame"
  src="https://pm-ru-content-agent-production.up.railway.app/admin/plugin-ui">
</iframe>

<script>
const frame = document.getElementById('frame');
const loading = document.getElementById('loading');

frame.addEventListener('load', () => {
  loading.style.display = 'none';
  frame.style.display = 'block';
});

frame.addEventListener('error', () => {
  loading.innerHTML = '<span style="color:#f87171">Не удалось загрузить интерфейс.<br>Проверьте соединение.</span>';
});

// Bridge: forward messages between Figma sandbox and Railway iframe
window.addEventListener('message', (e) => {
  if (e.source === frame.contentWindow) {
    // Railway iframe → Figma
    parent.postMessage(e.data, '*');
  } else {
    // Figma → Railway iframe
    if (frame.contentWindow) {
      frame.contentWindow.postMessage(e.data, '*');
    }
  }
});
</script>
</body>
</html>
